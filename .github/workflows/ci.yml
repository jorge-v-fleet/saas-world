name: CI

# Runs on every push to main. A PR merge into main lands as a push to main,
# so this covers both direct pushes and merged pull requests.
on:
  push:
    branches: [main]

permissions:
  contents: read

# Newer pushes to the same ref cancel in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint · types · tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Create venv (Python 3.12)
        run: uv venv --python 3.12

      - name: Install project + dev deps
        run: uv pip install -e ".[dev]"

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy)
        run: uv run mypy src

      - name: Tests (pytest)
        run: uv run pytest -q
